<app-header></app-header>
<ion-content [fullscreen]="true" class="ion-padding">
  <form [formGroup]="newTabForm" (ngSubmit)="onSubmit()">
    <ion-grid>
      <ion-input label="Tab Name:" name="tabName" formControlName="tabName"></ion-input>
      <ion-input label="Key:" name="key" formControlName="key"></ion-input>
      <br>
      <ion-button expand="block" type="submit">Submit</ion-button>
    </ion-grid>
  </form>
</ion-content>
