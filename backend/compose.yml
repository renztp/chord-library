services:
  db:
    image: postgres:16-alpine
    container_name: chord_library
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: chord_library_db
    ports:
      - "5431:5432"
    volumes:
      - chord_library_pgdata:/var/lib/postgresql/data

volumes:
  chord_library_pgdata: # Ensures data isnt deleted
